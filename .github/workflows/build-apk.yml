name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter 3.24.5
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
        cache: true

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet
      run: |
        pip install flet==0.25.2

    - name: Accept Android licenses
      run: |
        yes | flutter doctor --android-licenses || true

    - name: Diagnostics
      run: |
        flutter --version
        python --version
        flet --version

    - name: Build APK
      run: |
        flet build apk \
          --project "PingCameraMonitor" \
          --product "Ping Camera Monitor" \
          --org "com.pingcamera" \
          --build-version "1.0.0" \
          --build-number 1 \
          --verbose
      timeout-minutes: 45

    - name: Find APK
      run: |
        find . -name "*.apk" 2>/dev/null || echo "APK not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ping-camera-monitor-apk
        path: build/apk/outputs/flutter-apk/*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Upload build logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build/
        retention-days: 7
