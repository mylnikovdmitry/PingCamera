name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet==0.25.2

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Diagnostics
        run: |
          flutter --version
          python --version
          flet --version

      - name: Build APK
        run: |
          flet build apk \
            --project PingCameraMonitor \
            --org com.pingmonitor \
            --build-number ${{ github.run_number }} \
            --build-version 1.0.${{ github.run_number }}

      - name: Find APK
        run: find . -name "*.apk" -type f || echo "APK not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PingCameraMonitor-apk
          path: build/apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/
          if-no-files-found: ignore